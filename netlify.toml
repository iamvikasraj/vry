[build]
  publish = "out"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # Static export (output: 'export') — do not run @netlify/plugin-nextjs on the `out` folder
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/nda-unlock"
  to = "/.netlify/functions/nda-unlock"
  status = 200
  force = true

[[headers]]
  for = "/assets/video/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/projects/*/poster.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/projects/*/poster.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
