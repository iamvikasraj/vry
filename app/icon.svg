<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-reduced-motion: reduce) {
      .favicon-gradient-spin {
        animation: none;
      }
    }
  </style>
  <circle cx="200" cy="200" r="200" fill="url(#paint0_linear_49_3)"/>
  <defs>
    <linearGradient
      id="paint0_linear_49_3"
      class="favicon-gradient-spin"
      x1="77"
      y1="78"
      x2="409.5"
      y2="410.5"
      gradientUnits="userSpaceOnUse"
      gradientTransform="rotate(0 200 200)"
    >
      <stop stop-color="#9DF6C1"/>
      <stop offset="0.8" stop-color="#FCFAB0"/>
      <animateTransform
        attributeName="gradientTransform"
        type="rotate"
        from="0 200 200"
        to="360 200 200"
        dur="12s"
        repeatCount="indefinite"
      />
